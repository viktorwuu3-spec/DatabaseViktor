  /invoices/export/pdf:
    get:
      operationId: exportInvoicesPdf
      tags: [invoices]
      summary: Export invoices list as PDF
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /invoices/{id}/pdf:
    get:
      operationId: exportSingleInvoicePdf
      tags: [invoices]
      summary: Export single invoice as PDF
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /invoices/export/excel:
    get:
      operationId: exportInvoicesExcel
      tags: [invoices]
      summary: Export invoices as Excel
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /financial-summary:
