      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of cash in entries with calculated totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashInResponse"
    post:
      operationId: createCashIn
      tags: [cash-in]
      summary: Create a new cash in entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashInInput"
      responses:
        "201":
          description: Created cash in entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashIn"

  /cash-in/{id}:
    put:
      operationId: updateCashIn
      tags: [cash-in]
      summary: Update a cash in entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashInInput"
      responses:
        "200":
          description: Updated cash in entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashIn"
        "404":
