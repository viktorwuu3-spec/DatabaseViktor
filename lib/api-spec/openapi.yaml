openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: purchases
    description: Purchase data operations
  - name: purchase-plans
    description: Purchase plan operations
  - name: cash-in
    description: Cash in (Kas Masuk) operations
  - name: dashboard
    description: Dashboard and summary operations
  - name: backup
    description: Database backup operations
  - name: ai
    description: AI assistant operations
  - name: invoices
    description: Invoice / Memo operations
  - name: categories
    description: Category master data operations
  - name: suppliers
    description: Supplier master data operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /purchases:
    get:
      operationId: getPurchases
      tags: [purchases]
      summary: Get all purchases
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: kategori
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a new purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "201":
          description: Created purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}:
    get:
      operationId: getPurchase
      tags: [purchases]
      summary: Get a purchase by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePurchase
      tags: [purchases]
      summary: Update a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "200":
          description: Updated purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePurchase
      tags: [purchases]
      summary: Delete a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchases/bulk-delete:
    post:
      operationId: bulkDeletePurchases
      tags: [purchases]
      summary: Delete multiple purchases by IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /purchases/export/excel:
    get:
      operationId: exportPurchasesExcel
      tags: [purchases]
      summary: Export purchases as Excel file
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: kategori
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated IDs for selective export
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /purchases/export/pdf:
    get:
      operationId: exportPurchasesPdf
      tags: [purchases]
      summary: Export purchases as PDF file
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: kategori
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated IDs for selective export
      responses:
        "200":
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /purchase-plans:
    get:
      operationId: getPurchasePlans
      tags: [purchase-plans]
      summary: Get all purchase plans
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: kategori
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of purchase plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchasePlan"
    post:
      operationId: createPurchasePlan
      tags: [purchase-plans]
      summary: Create a new purchase plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchasePlanInput"
      responses:
        "201":
          description: Created purchase plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchasePlan"

  /purchase-plans/{id}:
    get:
      operationId: getPurchasePlan
      tags: [purchase-plans]
      summary: Get a purchase plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchasePlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePurchasePlan
      tags: [purchase-plans]
      summary: Update a purchase plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchasePlanInput"
      responses:
        "200":
          description: Updated purchase plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchasePlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePurchasePlan
      tags: [purchase-plans]
      summary: Delete a purchase plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase-plans/bulk-delete:
    post:
      operationId: bulkDeletePurchasePlans
      tags: [purchase-plans]
      summary: Delete multiple purchase plans by IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /purchase-plans/export/excel:
    get:
      operationId: exportPurchasePlansExcel
      tags: [purchase-plans]
      summary: Export purchase plans as Excel file
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: kategori
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated IDs for selective export
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /purchase-plans/export/pdf:
    get:
      operationId: exportPurchasePlansPdf
      tags: [purchase-plans]
      summary: Export purchase plans as PDF file
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: kategori
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated IDs for selective export
      responses:
        "200":
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /cash-in:
