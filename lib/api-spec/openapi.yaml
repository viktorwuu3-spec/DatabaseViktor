          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCashIn
      tags: [cash-in]
      summary: Delete a cash in entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cash-in/bulk-delete:
    post:
      operationId: bulkDeleteCashIn
      tags: [cash-in]
      summary: Delete multiple cash in entries by IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /cash-in/export/excel:
    get:
      operationId: exportCashInExcel
      tags: [cash-in]
      summary: Export cash in as Excel file
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated IDs for selective export
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /cash-in/export/pdf:
    get:
      operationId: exportCashInPdf
      tags: [cash-in]
      summary: Export cash in as PDF file
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
