kind = "web"
previewPath = "/"
title = "Purchase Manager"
version = "1.0.0"
id = "artifacts/purchase-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20967

[services.development]
run = "pnpm --filter @workspace/purchase-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/purchase-app", "run", "build" ]
publicDir = "artifacts/purchase-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20967"
BASE_PATH = "/"
